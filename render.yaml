services:
  - type: web
    name: redxmainpair
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: PASTEBIN_API_KEY
        value: ""   # unused now (session delivery is direct base64, not Pastebin) — set in Render dashboard if you ever need it, never commit real keys here
      - key: PASTEBIN_PRIVACY
        value: "1"
      - key: PASTEBIN_EXPIRE
        value: "1M"
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: redxmainpair
          property: host
